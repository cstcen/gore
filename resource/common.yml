gore:
  path: config
  file-name: config.yml
  file-name-env: config-%s.yml
  logger:
    level: trace
  cache:
    enable: false
    enable-ring: false
    app-name: gore
  elasticsearch:
    enable: false
    index:
    shards: 1
    replicas: 0
  mongo:
    enable: false
    app-name: gore
    timeout: 30s
  mysql:
    enable: false
    conn-max-life-time: 3m
    max-open-conns: 10
    max-idle-conns: 10
    dsn:
      protocol: tcp
      dbname:
      params: ?charset=UTF8&loc=UTC
  kafka:
    enable: false
    version: 2.5.0
    assignor: range
    oldest: false